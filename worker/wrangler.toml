name = "hotel-self-service-check-in-system"
main = "src/index.js"
# SPA + assets routing; keep in sync with Workers static-assets docs.
compatibility_date = "2025-04-01"

# Built Vite app (run `npm run build:frontend` before deploy).
[assets]
directory = "../frontend/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Ensure /api/* hits Hono; everything else is static / SPA shell.
run_worker_first = [ "/api/*" ]

# D1 database binding.
#
# First time:  wrangler d1 create cliff_inn
# Then paste the returned "database_id" below, replacing the placeholder.
[[d1_databases]]
binding = "DB"
database_name = "cliff_inn"
database_id = "21ab9eb0-aa20-4eb0-a259-73c8c0df235a"

# Daily cron at 04:00 UTC ≈ 14:00 Brisbane — deletes records older than 2 days.
[triggers]
crons = ["0 4 * * *"]

[vars]
# Same origin as this Worker when using workers.dev (see DEPLOY.md for Pages-only setups).
# Local: worker/.dev.vars overrides (ensure-dev-vars.mjs).
CORS_ORIGIN = "https://hotel-self-service-check-in-system.n12047805.workers.dev"

# JWT_SECRET: local `npm run dev` auto-writes worker/.dev.vars (gitignored).
# Production:  wrangler secret put JWT_SECRET
